spring:
  application:
    name: booking

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/Booking}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:808/realms/booking-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:808/realms/booking-realm/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:808}
  realm: ${KEYCLOAK_REALM:booking-realm}
  admin-realm: ${KEYCLOAK_ADMIN_REALM:master}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
