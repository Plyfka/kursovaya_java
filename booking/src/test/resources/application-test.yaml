spring:
  datasource:
    url: jdbc:h2:mem:booking-it;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost/dummy/jwks

keycloak:
  server-url: http://localhost/dummy
  realm: booking-realm
  admin-realm: master
  admin-client-id: admin-cli
  admin-client-secret: secret
  admin-username: admin
  admin-password: admin
